<!DOCTYPE html>
<html>
<head>
    <title>Brain Tumor Detection</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            height: 100vh;

            
            background: linear-gradient(to right, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 400px;
            background: rgba(255,255,255,0.95);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.3);
        }

        h1 {
            color: #1e3a8a;
        }

        input[type="file"] {
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            background: #1e88e5;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #1565c0;
        }

        .result {
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
        }

        .confidence {
            margin-top: 10px;
            font-size: 16px;
            color: #2e7d32;
        }

        .bar-container {
            width: 100%;
            background: #ddd;
            border-radius: 10px;
            margin-top: 10px;
        }

        .bar {
            height: 20px;
            background: #4caf50;
            border-radius: 10px;
            text-align: center;
            color: white;
            font-size: 12px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🧠 Brain Tumor Detection</h1>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <input type="file" name="image"><br><br>
        <button type="submit">Predict</button>
    </form>

    <br>

    {% if error %}
        <p style="color:red">{{ error }}</p>
    {% endif %}

    {% if result %}
        <div class="result">{{ result }}</div>
    {% endif %}

    {% if confidence %}
        <div class="confidence">Confidence: {{ confidence }}</div>

        
        <div class="bar-container">
            <div class="bar" style="width: {{ confidence }};">
                {{ confidence }}
            </div>
        </div>
    {% endif %}

</div>

</body>
</html>

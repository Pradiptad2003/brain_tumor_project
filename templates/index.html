<!DOCTYPE html>
<html>
<head>
    <title>Brain Tumor Detection</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;

            background-image: url("static/images/brain-graphic-2 (1).jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
        }

        .container {
            width: 400px;
            margin: 120px auto;
            background: rgba(255,255,255,0.9);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.3);
        }

        h1 {
            color: #1e3a8a;
        }

        button {
            padding: 10px 20px;
            background: #1e88e5;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #1565c0;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🧠 Brain Tumor Detection</h1>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <input type="file" name="image"><br><br>
        <button type="submit">Predict</button>
    </form>

    <br>

    {% if error %}
        <p style="color:red">{{ error }}</p>
    {% endif %}

    {% if result %}
        <h2>{{ result }}</h2>
    {% endif %}

</div>

</body>
</html>
